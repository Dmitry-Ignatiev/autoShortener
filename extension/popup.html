<!-- popup.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AutoShortener</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 150px;
    }

    .dialog {
      background: white;
      padding: 16px 24px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      text-align: center;
      font-weight: bold;
      font-size: 1.2em;
    }
  </style>
</head>
<body>
  <div class="dialog" id="responseBox">Loading...</div>

  <script>
    async function fetchShortUrl() {
      try {
        // Example: fetch from your backend
        const res = await fetch('https://your-backend-url/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: 'https://example.com' })
        });
        const data = await res.text(); // or res.json() if JSON
        document.getElementById('responseBox').innerText = data; // <-- shows 0d3c01
      } catch (err) {
        document.getElementById('responseBox').innerText = 'Error';
      }
    }

    fetchShortUrl();
  </script>
</body>
</html>
