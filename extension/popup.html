<!DOCTYPE html>
<html>
  <body>
    <script>
      const url = prompt("Enter URL to shorten:");
      if (url) {
        fetch("/autoShortener", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url })
        })
        .then(res => res.json())
        .then(data => alert("Short URL: " + data.short))
        .catch(err => alert("Error: " + err));
      }
    </script>
  </body>
</html>
