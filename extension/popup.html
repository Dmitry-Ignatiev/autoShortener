<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AutoShortener</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 8px;
    }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .dialog {
      margin-top: 12px;
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      background: white;
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
      text-align: center;
      font-weight: bold;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <input type="text" id="url" placeholder="Enter URL to shorten" />
  <button id="shorten">Shorten and Copy to Clipboard</button>
  <div class="dialog" id="responseBox">Your shortened URL will appear here</div>

<script src="popup.js"></script>
</body>
</html>
